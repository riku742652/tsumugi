<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaim CSV Visualizer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Auth screen -->
    <div id="auth-screen">
      <div class="auth-card">
        <h1>ログイン</h1>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" autocomplete="current-password" />
        </div>
        <button id="login-btn" class="btn-primary" style="width:100%">ログイン</button>
        <p id="auth-error" style="color:var(--danger);font-size:0.875rem;margin-top:0.5rem;min-height:1.25rem;"></p>
      </div>
    </div>

    <!-- Main screen (hidden until logged in) -->
    <div id="main-screen" style="display:none">
      <header>
        <h1>Zaim CSV Visualizer</h1>
        <button id="logout-btn" class="btn-outline">ログアウト</button>
      </header>

      <!-- Drop zone -->
      <div id="drop-zone">
        <p>CSV ファイルをドラッグ＆ドロップ</p>
        <p>または</p>
        <label for="csv-input" class="btn-primary" style="display:inline-block;padding:0.5rem 1rem;border-radius:8px;cursor:pointer">
          ファイルを選択
        </label>
        <input type="file" id="csv-input" accept=".csv" style="display:none" />
      </div>
      <p id="status-msg"></p>

      <!-- Filters -->
      <div class="filters">
        <div>
          <label for="month-filter">月フィルター（開始）</label>
          <input type="month" id="from-filter" />
        </div>
        <div>
          <label for="to-filter">月フィルター（終了）</label>
          <input type="month" id="to-filter" />
        </div>
        <label class="toggle-label">
          <input type="checkbox" id="include-non-aggregated" />
          集計外を含む
        </label>
        <button id="load-btn" class="btn-primary">データ取得</button>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <h2>月別支出合計</h2>
          <canvas id="chart-monthly-expense"></canvas>
        </div>
        <div class="chart-card">
          <h2>カテゴリ別内訳</h2>
          <canvas id="chart-category-breakdown"></canvas>
        </div>
        <div class="chart-card">
          <h2>収入 vs 支出</h2>
          <canvas id="chart-income-vs-expense"></canvas>
        </div>
        <div class="chart-card">
          <h2>カテゴリ別月次推移</h2>
          <canvas id="chart-category-trend"></canvas>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
